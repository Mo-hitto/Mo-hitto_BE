name: Deploy To EC2

on:
  pull_request:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository 파일 불러오기
        uses: actions/checkout@v4

      - name: JDK 17버전 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 테스트 및 빌드하기
        run: ./gradlew clean build -x test

      - name: AWS Resource 접근 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드
        run: docker build -t mohitto-server .

      - name: Docker 이미지 태그 지정
        run: docker tag mohitto-server ${{ steps.login-ecr.outputs.registry }}/mohitto-server:latest

      - name: Docker 이미지 ECR에 Push
        run: docker push ${{ steps.login-ecr.outputs.registry }}/mohitto-server:latest

      - name: docker-compose.yml 파일 EC2로 복사
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: docker-compose.yml
          target: /home/ubuntu/

      - name: .env 파일 EC2에 동적 생성 (Secrets에서 가져옴)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          script: |
            cat <<EOF > /home/ubuntu/.env
            ${{ secrets.ENV_FILE_CONTENT }}
            EOF

      - name: EC2에서 docker compose up -d 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/
            sudo docker rm -f mohitto-server || true
            sudo docker rmi ${{ steps.login-ecr.outputs.registry }}/mohitto-server:latest || true
            docker pull ${{ steps.login-ecr.outputs.registry }}/mohitto-server:latest
            sudo docker-compose up -d --no-deps --force-recreate --remove-orphans app
            sudo docker-compose logs
            sudo docker image prune -f