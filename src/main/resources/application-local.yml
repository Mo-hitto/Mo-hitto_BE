spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:tcp://localhost/~/mohitto
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  cors:
    allowed-origins:
      - http://localhost:8080
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

token:
  jwt:
    access-key: ThisIsLocalAccessKeyThisIsLocalAccessKey
    refresh-key: ThisIsLocalRefreshKeyThisIsLocalRefreshKey
    access-expired-hours: 5 # 5시간
    refresh-expired-hours: 336  # 14일

oauth2:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: http://localhost:8080/oauth2/kakao/callback
    scope: ${KAKAO_SCOPE}

cloud:
  aws:
    region: ${S3_REGION}
    accessKey: ${S3_ACCESS_KEY}
    secretKey: ${S3_SECRET_KEY}
    bucket: ${S3_BUCKET}

naver:
  client-id: ${NAVER_CLIENT_ID}
  secret: ${NAVER_SECRET}

fastapi:
  extract-face: ${FASTAPI_FIRST_URL}
  graph-rag: ${FASTAPI_SECOND_URL}
  hair-transfer: ${FASTAPI_THIRD_URL}