spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update # 배포 환경에서는 update
    show-sql: true
  cors:
    allowed-origins: ${SPRING_CORS_ALLOWED_ORIGINS}

token:
  jwt:
    access-key: ${JWT_ACCESS_TOKEN_SECRET}
    refresh-key: ${JWT_REFRESH_TOKEN_SECRET}
    access-expired-hours: ${JWT_ACCESS_TOKEN_EXPIRATION_TIME}
    refresh-expired-hours: ${JWT_REFRESH_TOKEN_EXPIRATION_TIME}

oauth2:
  kakao:
    client_id: ${KAKAO_CLIENT_ID}
    client_secret: ${KAKAO_CLIENT_SECRET}
    redirect_uri: ${KAKAO_REDIRECT_URI}
    scope: ${KAKAO_SCOPE}

cloud:
  aws:
    region: ${S3_REGION}
    accessKey: ${S3_ACCESS_KEY}
    secretKey: ${S3_SECRET_KEY}
    bucket: ${S3_BUCKET}

naver:
  client-id: ${NAVER_CLIENT_ID}
  secret: ${NAVER_SECRET}

fastapi:
  extract-face: ${FASTAPI_FIRST_URL}
  graph-rag: ${FASTAPI_SECOND_URL}
  hair-transfer: ${FASTAPI_THIRD_URL}